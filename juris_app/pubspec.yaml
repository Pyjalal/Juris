name: juris_app
description: "AI-powered legal agent for Malaysian tenants. Scan tenancy agreements, detect illegal clauses, generate Letters of Demand."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  cloud_functions: ^5.3.5

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7+1
  cupertino_icons: ^1.0.8

  # Camera / Image
  image_picker: ^1.1.2

  # Utilities
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
